name: Build Theos

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Build Package
        run: make package FINALPACKAGE=1

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: Packages
          path: packages/*.deb
